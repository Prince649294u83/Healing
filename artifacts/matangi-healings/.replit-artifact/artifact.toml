kind = "web"
previewPath = "/"
title = "Matangi Healings"
version = "1.0.0"
id = "artifacts/matangi-healings"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18841

[services.development]
run = "pnpm --filter @workspace/matangi-healings run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matangi-healings", "run", "build" ]
publicDir = "artifacts/matangi-healings/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18841"
BASE_PATH = "/"
